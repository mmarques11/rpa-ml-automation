name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint and format check
        run: |
          pip install black==24.1.0 isort==5.12.0
          black --check .
          isort --check-only .

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q

      - name: Build Docker images
        run: |
          docker compose build inference ingestor processor rpa-runner

      - name: Run tests in Docker
        run: |
          docker compose run --rm tests
